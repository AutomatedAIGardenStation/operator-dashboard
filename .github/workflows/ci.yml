# frontend CI (React + Ionic + Vite + Vitest)
# Runs on every push / PR to main.
# Type-checks, lints, tests, and builds the production bundle.

name: frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run unit tests (Vitest)
        run: npm run test -- --reporter=verbose

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ── Notify ci-cd repo ──────────────────────────────────────────────────────
  notify-ci-cd:
    name: Notify GardenStation-ci-cd
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Dispatch frontend-changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace(/^refs\/heads\//, '');
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
            const status = '${{ needs.ci.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'frontend-changed',
              client_payload: { branch, pr_number: prNumber, status }
            });
            console.log(`Dispatched frontend-changed (${status})`);
